<svg xmlns="http://www.w3.org/2000/svg" width="280" height="560" viewBox="0 0 280 560">
  <rect width="280" height="560" rx="32" fill="#1A1A1A"/>
  <rect x="8" y="8" width="264" height="544" rx="26" fill="#222"/>
  <rect x="90" y="20" width="100" height="10" rx="5" fill="#333"/>
  <!-- Header -->
  <text x="140" y="62" font-family="sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="700">일주일 사용 이력</text>
  <!-- Weekly bar chart -->
  <text x="44" y="110" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">월</text>
  <rect x="30" y="115" width="28" height="80" rx="4" fill="#333"/>
  <rect x="30" y="155" width="28" height="40" rx="4" fill="#D12F2F" opacity="0.7"/>
  <text x="100" y="110" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">화</text>
  <rect x="86" y="115" width="28" height="80" rx="4" fill="#333"/>
  <rect x="86" y="130" width="28" height="65" rx="4" fill="#D12F2F" opacity="0.7"/>
  <text x="156" y="110" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">수</text>
  <rect x="142" y="115" width="28" height="80" rx="4" fill="#333"/>
  <rect x="142" y="140" width="28" height="55" rx="4" fill="#D12F2F" opacity="0.7"/>
  <text x="212" y="110" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">목</text>
  <rect x="198" y="115" width="28" height="80" rx="4" fill="#333"/>
  <rect x="198" y="145" width="28" height="50" rx="4" fill="#D12F2F" opacity="0.7"/>
  <text x="252" y="110" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">금</text>
  <rect x="238" y="115" width="28" height="80" rx="4" fill="#333"/>
  <rect x="238" y="135" width="28" height="60" rx="4" fill="#D12F2F"/>
  <!-- Average line -->
  <line x1="24" y1="162" x2="268" y2="162" stroke="#fff" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.2"/>
  <text x="260" y="160" font-family="sans-serif" font-size="8" fill="#555" text-anchor="end">평균</text>
  <!-- Stats row -->
  <rect x="24" y="220" width="110" height="60" rx="8" fill="#2A2A2A"/>
  <text x="79" y="244" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">자동 모드</text>
  <text x="79" y="264" font-family="sans-serif" font-size="16" fill="#D12F2F" text-anchor="middle" font-weight="700">68%</text>
  <text x="79" y="278" font-family="sans-serif" font-size="8" fill="#555" text-anchor="middle">사용 비율</text>
  <rect x="148" y="220" width="110" height="60" rx="8" fill="#2A2A2A"/>
  <text x="203" y="244" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">수동 개입</text>
  <text x="203" y="264" font-family="sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">↓60%</text>
  <text x="203" y="278" font-family="sans-serif" font-size="8" fill="#555" text-anchor="middle">자동화 이후</text>
  <!-- Power chart -->
  <text x="44" y="318" font-family="sans-serif" font-size="11" fill="#fff" font-weight="600">전력 소비</text>
  <rect x="24" y="328" width="232" height="8" rx="4" fill="#333"/>
  <rect x="24" y="328" width="138" height="8" rx="4" fill="#D12F2F"/>
  <text x="24" y="352" font-family="sans-serif" font-size="9" fill="#555">현재 (자동)</text>
  <text x="256" y="352" font-family="sans-serif" font-size="9" fill="#888" text-anchor="end">기존 대비 -40%</text>
  <!-- Bottom nav -->
  <rect x="24" y="510" width="50" height="28" rx="6" fill="#2A2A2A"/>
  <text x="49" y="529" font-family="sans-serif" font-size="9" fill="#666" text-anchor="middle">홈</text>
  <rect x="90" y="510" width="50" height="28" rx="6" fill="#D12F2F"/>
  <text x="115" y="529" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">이력</text>
  <rect x="156" y="510" width="50" height="28" rx="6" fill="#2A2A2A"/>
  <text x="181" y="529" font-family="sans-serif" font-size="9" fill="#666" text-anchor="middle">설정</text>
</svg>
