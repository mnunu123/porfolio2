<svg xmlns="http://www.w3.org/2000/svg" width="280" height="560" viewBox="0 0 280 560">
  <rect width="280" height="560" rx="32" fill="#1A1A1A"/>
  <rect x="8" y="8" width="264" height="544" rx="26" fill="#222"/>
  <!-- Status bar -->
  <rect x="90" y="20" width="100" height="10" rx="5" fill="#333"/>
  <!-- Header -->
  <rect x="24" y="50" width="160" height="18" rx="4" fill="#333"/>
  <rect x="232" y="52" width="24" height="14" rx="3" fill="#D12F2F"/>
  <!-- Mode selector -->
  <rect x="24" y="84" width="232" height="40" rx="8" fill="#2A2A2A"/>
  <rect x="26" y="86" width="110" height="36" rx="7" fill="#D12F2F"/>
  <text x="81" y="109" font-family="sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="600">자동 모드</text>
  <text x="197" y="109" font-family="sans-serif" font-size="12" fill="#666" text-anchor="middle">수동 모드</text>
  <!-- Lamp visual -->
  <circle cx="140" cy="210" r="60" fill="#2A2A2A"/>
  <circle cx="140" cy="200" r="36" fill="#D12F2F" opacity="0.15"/>
  <circle cx="140" cy="200" r="24" fill="#D12F2F" opacity="0.3"/>
  <circle cx="140" cy="200" r="12" fill="#D12F2F" opacity="0.9"/>
  <!-- Sensor values -->
  <rect x="24" y="290" width="68" height="56" rx="8" fill="#2A2A2A"/>
  <text x="58" y="314" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">조도</text>
  <text x="58" y="334" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">342</text>
  <text x="58" y="347" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">lux</text>
  <rect x="106" y="290" width="68" height="56" rx="8" fill="#2A2A2A"/>
  <text x="140" y="314" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">온도</text>
  <text x="140" y="334" font-family="sans-serif" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">22.4</text>
  <text x="140" y="347" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">°C</text>
  <rect x="188" y="290" width="68" height="56" rx="8" fill="#2A2A2A"/>
  <text x="222" y="314" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle">움직임</text>
  <text x="222" y="334" font-family="sans-serif" font-size="14" fill="#D12F2F" text-anchor="middle" font-weight="700">ON</text>
  <text x="222" y="347" font-family="sans-serif" font-size="9" fill="#555" text-anchor="middle">감지 중</text>
  <!-- Label -->
  <text x="140" y="380" font-family="sans-serif" font-size="10" fill="#555" text-anchor="middle">현재 밝기</text>
  <rect x="24" y="390" width="232" height="6" rx="3" fill="#333"/>
  <rect x="24" y="390" width="160" height="6" rx="3" fill="#D12F2F"/>
  <!-- Bottom nav -->
  <rect x="24" y="510" width="50" height="28" rx="6" fill="#D12F2F"/>
  <text x="49" y="529" font-family="sans-serif" font-size="9" fill="#fff" text-anchor="middle">홈</text>
  <rect x="90" y="510" width="50" height="28" rx="6" fill="#2A2A2A"/>
  <text x="115" y="529" font-family="sans-serif" font-size="9" fill="#666" text-anchor="middle">이력</text>
  <rect x="156" y="510" width="50" height="28" rx="6" fill="#2A2A2A"/>
  <text x="181" y="529" font-family="sans-serif" font-size="9" fill="#666" text-anchor="middle">설정</text>
</svg>
